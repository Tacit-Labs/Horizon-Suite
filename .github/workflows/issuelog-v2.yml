name: Post Issue Log to Discord (v2 redesign)
# Parallel v2 of issuelog.yml — posts the redesigned hero + category messages
# to a SEPARATE test channel so we can iterate on the layout without disrupting
# the live channel served by issuelog.yml. Manual-dispatch only.
#
# Required repository secret: DISCORD_WEBHOOK_ISSUELOG_V2
# (set to a webhook pointing at the test channel).
#
# Once the redesign is approved, flip the production workflow to this script
# (or swap DISCORD_WEBHOOK_ISSUELOG → the new webhook) and retire v1.

on:
  workflow_dispatch:

permissions:
  issues: read
  contents: read
  actions: write

concurrency:
  group: issuelog-v2
  cancel-in-progress: true

jobs:
  issuelog-v2:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore cached message IDs
        uses: actions/cache/restore@v4
        with:
          path: .release/discord-issuelog-v2-message-id
          key: issuelog-v2-msg-ids

      - name: Generate v2 issue log payloads
        run: bash .release/run-issuelog-v2.sh

      - name: Post or update Discord messages (v2)
        id: discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUELOG_V2 }}
        run: |
          MSG_ID_FILE=.release/discord-issuelog-v2-message-id
          NEW_IDS=$(mktemp)

          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "::notice::Discord issuelog v2 skipped: repository secret DISCORD_WEBHOOK_ISSUELOG_V2 is not set (or empty)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            rm -f "$NEW_IDS"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Delete previously-cached messages (one ID per line).
          # We delete-and-repost rather than edit so the post bumps the channel.
          if [ -f "$MSG_ID_FILE" ]; then
            while IFS= read -r id || [ -n "$id" ]; do
              id=$(echo "$id" | tr -d '[:space:]')
              [ -z "$id" ] && continue
              DEL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                "${WEBHOOK_URL}/messages/${id}" || echo "000")
              echo "DELETE ${id} returned ${DEL_HTTP}"
            done < "$MSG_ID_FILE"
          fi

          # Post in order: hero first, then categories.
          for type in hero bugs features improvements ideas; do
            PAYLOAD=".release/discord-issuelog-v2-payload-${type}.json"
            if [ -f "$PAYLOAD" ]; then
              echo "Posting ${type} ($(wc -c < "$PAYLOAD") bytes)"
              BODY_FILE=$(mktemp)
              HTTP=$(curl -sS -o "$BODY_FILE" -w "%{http_code}" -X POST \
                "${WEBHOOK_URL}?wait=true" \
                -H "Content-Type: application/json" \
                -d @"$PAYLOAD")
              if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
                echo "Failed to post ${type} (HTTP ${HTTP}): $(tr -d '\r' < "$BODY_FILE" | head -c 1200)"
                rm -f "$BODY_FILE" "$NEW_IDS"
                exit 1
              fi
              if ! NEW_ID=$(tr -d '\r' < "$BODY_FILE" | jq -r '.id // empty'); then
                echo "Failed to parse Discord JSON for ${type} (HTTP ${HTTP}): $(tr -d '\r' < "$BODY_FILE" | head -c 1200)"
                rm -f "$BODY_FILE" "$NEW_IDS"
                exit 1
              fi
              rm -f "$BODY_FILE"
              if [ -n "$NEW_ID" ]; then
                echo "$NEW_ID" >> "$NEW_IDS"
                echo "Posted ${type} message ${NEW_ID}"
              else
                echo "Failed to post ${type} (HTTP ${HTTP}, no message id in JSON response)"
                rm -f "$NEW_IDS"
                exit 1
              fi
            fi
          done

          mv "$NEW_IDS" "$MSG_ID_FILE"
          echo "Cached $(wc -l < "$MSG_ID_FILE") message ID(s)"
          echo "id=$(head -1 "$MSG_ID_FILE" 2>/dev/null || true)" >> $GITHUB_OUTPUT

      - name: Invalidate previous cache entry
        if: steps.discord.outputs.skip != 'true' && steps.discord.outputs.id != ''
        run: |
          gh cache delete issuelog-v2-msg-ids --repo "$GITHUB_REPOSITORY" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write cache
        if: steps.discord.outputs.skip != 'true' && steps.discord.outputs.id != ''
        uses: actions/cache/save@v4
        with:
          path: .release/discord-issuelog-v2-message-id
          key: issuelog-v2-msg-ids
