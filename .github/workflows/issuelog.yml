name: Post Issue Log to Discord
# Requires repository secret: DISCORD_WEBHOOK_ISSUELOG
# Deletes old message and posts new on each run (for channel activity / unread indicators).
# Message ID is cached (not committed) to avoid pushing to protected main.

on:
  workflow_dispatch:
  issues:
    types: [opened, closed, edited, reopened]

permissions:
  issues: read

concurrency:
  group: issuelog
  cancel-in-progress: true

jobs:
  issuelog:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Discord message ID
        uses: actions/cache@v4
        with:
          path: .release
          key: issuelog-message-id-${{ github.repository }}
          save-always: true

      - name: Generate issue log payload
        run: bash .release/run-issuelog.sh

      - name: Post or update Discord message
        id: discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUELOG }}
        run: |
          MSG_ID_FILE=.release/discord-issuelog-message-id
          MSG_ID=""
          [ -f "$MSG_ID_FILE" ] && MSG_ID=$(cat "$MSG_ID_FILE" | tr -d '[:space:]')

          if [ -n "$MSG_ID" ]; then
            # Delete old message (best-effort; 204 or 404 both OK)
            DEL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "${WEBHOOK_URL}/messages/${MSG_ID}" || echo "000")
            echo "DELETE returned ${DEL_HTTP}"
          fi

          # Always post new message (?wait=true returns the message object with id)
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "${WEBHOOK_URL}?wait=true" \
            -H "Content-Type: application/json" \
            -d @.release/discord-issuelog-payload.json)
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          NEW_ID=$(echo "$BODY" | jq -r '.id // empty')
          if [ -n "$NEW_ID" ]; then
            echo "$NEW_ID" > "$MSG_ID_FILE"
            echo "id=$NEW_ID" >> $GITHUB_OUTPUT
            echo "Posted new Discord message"
          else
            echo "Failed to post: $BODY"
            exit 1
          fi

