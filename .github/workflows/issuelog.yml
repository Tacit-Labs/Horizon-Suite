name: Post Issue Log to Discord
# Requires repository secret: DISCORD_WEBHOOK_ISSUELOG
# Keeps a single persistent message and edits it on each run.
# Message ID is cached (not committed) to avoid pushing to protected main.

on:
  workflow_dispatch:
  issues:
    types: [opened, closed, edited, reopened]

permissions:
  issues: read

concurrency:
  group: issuelog
  cancel-in-progress: true

jobs:
  issuelog:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Discord message ID cache
        id: cache-issuelog
        uses: actions/cache/restore@v4
        with:
          path: .release
          key: issuelog-message-id-${{ github.repository }}

      - name: Generate issue log payload
        run: bash .release/run-issuelog.sh

      - name: Post or update Discord message
        id: discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUELOG }}
        run: |
          MSG_ID_FILE=.release/discord-issuelog-message-id
          MSG_ID=""
          [ -f "$MSG_ID_FILE" ] && MSG_ID=$(cat "$MSG_ID_FILE" | tr -d '[:space:]')

          if [ -n "$MSG_ID" ]; then
            # Edit existing message to keep a single persistent issue log.
            RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
              "${WEBHOOK_URL}/messages/${MSG_ID}" \
              -H "Content-Type: application/json" \
              -d @.release/discord-issuelog-payload.json)
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP" = "200" ]; then
              echo "id=$MSG_ID" >> $GITHUB_OUTPUT
              echo "Updated existing Discord message ${MSG_ID}"
              exit 0
            fi
            echo "PATCH returned ${HTTP}; falling back to create new message"
          fi

          # Fallback/create path (?wait=true returns the message object with id)
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "${WEBHOOK_URL}?wait=true" \
            -H "Content-Type: application/json" \
            -d @.release/discord-issuelog-payload.json)
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          NEW_ID=$(echo "$BODY" | jq -r '.id // empty')
          if [ "$HTTP" = "200" ] && [ -n "$NEW_ID" ]; then
            echo "$NEW_ID" > "$MSG_ID_FILE"
            echo "id=$NEW_ID" >> $GITHUB_OUTPUT
            echo "Posted new Discord message ${NEW_ID}"
          else
            echo "Failed to create or update Discord message (HTTP ${HTTP}): $BODY"
            exit 1
          fi

      - name: Save Discord message ID cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .release
          key: ${{ steps.cache-issuelog.outputs.cache-primary-key }}

