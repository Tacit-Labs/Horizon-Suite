name: Post Issue Log to Discord
# Requires repository secret: DISCORD_WEBHOOK_ISSUELOG
# Updates the same Discord message on each run (edit in place rather than post new).

on:
  workflow_dispatch:
  issues:
    types: [opened, closed, edited, reopened]

permissions:
  issues: read
  contents: write  # to commit updated message ID

concurrency:
  group: issuelog
  cancel-in-progress: true

jobs:
  issuelog:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate issue log payload
        run: bash .release/run-issuelog.sh

      - name: Post or update Discord message
        id: discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUELOG }}
        run: |
          MSG_ID_FILE=.release/discord-issuelog-message-id
          MSG_ID=""
          [ -f "$MSG_ID_FILE" ] && MSG_ID=$(cat "$MSG_ID_FILE" | tr -d '[:space:]')

          if [ -n "$MSG_ID" ]; then
            # Edit existing message
            RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
              "${WEBHOOK_URL}/messages/${MSG_ID}" \
              -H "Content-Type: application/json" \
              -d @.release/discord-issuelog-payload.json)
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP" = "200" ]; then
              echo "Updated existing Discord message"
              echo "id=$MSG_ID" >> $GITHUB_OUTPUT
            else
              # Message deleted or invalid; create new
              echo "PATCH failed (${HTTP}), creating new message"
              MSG_ID=""
            fi
          fi

          if [ -z "$MSG_ID" ]; then
            # Create new message (?wait=true returns the message object with id)
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              "${WEBHOOK_URL}?wait=true" \
              -H "Content-Type: application/json" \
              -d @.release/discord-issuelog-payload.json)
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            NEW_ID=$(echo "$BODY" | jq -r '.id // empty')
            if [ -n "$NEW_ID" ]; then
              echo "$NEW_ID" > "$MSG_ID_FILE"
              echo "id=$NEW_ID" >> $GITHUB_OUTPUT
              echo "Posted new Discord message"
            else
              echo "Failed to post: $BODY"
              exit 1
            fi
          fi

      - name: Commit message ID if changed
        if: steps.discord.outputs.id != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release/discord-issuelog-message-id
          git diff --staged --quiet && exit 0
          git commit -m "chore: update Discord issuelog message ID"
          git push
