name: Post Issue Log to Discord
# Requires repository secret: DISCORD_WEBHOOK_ISSUELOG
# Deletes old Discord message and posts a new one each run (triggers channel activity).
# Message ID is persisted via GitHub Actions cache (delete-before-save to avoid immutability).

on:
  workflow_dispatch:
  issues:
    types: [opened, closed, edited, reopened]

permissions:
  issues: read
  contents: read
  actions: write

concurrency:
  group: issuelog
  cancel-in-progress: true

jobs:
  issuelog:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore cached message ID
        uses: actions/cache/restore@v4
        with:
          path: .release/discord-issuelog-message-id
          key: issuelog-msg-id

      - name: Generate issue log payload
        run: bash .release/run-issuelog.sh

      - name: Post or update Discord message
        id: discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUELOG }}
        run: |
          MSG_ID_FILE=.release/discord-issuelog-message-id
          MSG_ID=""
          [ -f "$MSG_ID_FILE" ] && MSG_ID=$(cat "$MSG_ID_FILE" | tr -d '[:space:]')

          if [ -n "$MSG_ID" ]; then
            DEL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "${WEBHOOK_URL}/messages/${MSG_ID}" || echo "000")
            echo "DELETE returned ${DEL_HTTP}"
          fi

          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "${WEBHOOK_URL}?wait=true" \
            -H "Content-Type: application/json" \
            -d @.release/discord-issuelog-payload.json)
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          NEW_ID=$(echo "$BODY" | jq -r '.id // empty')
          if [ -n "$NEW_ID" ]; then
            echo "$NEW_ID" > "$MSG_ID_FILE"
            echo "id=$NEW_ID" >> $GITHUB_OUTPUT
            echo "Posted new Discord message ${NEW_ID}"
          else
            echo "Failed to post (HTTP ${HTTP}): $BODY"
            exit 1
          fi

      - name: Save message ID to cache
        if: steps.discord.outputs.id != ''
        run: |
          gh cache delete issuelog-msg-id --repo "$GITHUB_REPOSITORY" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write cache
        if: steps.discord.outputs.id != ''
        uses: actions/cache/save@v4
        with:
          path: .release/discord-issuelog-message-id
          key: issuelog-msg-id

