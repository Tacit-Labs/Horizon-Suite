name: Setup Labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete deprecated labels
        uses: actions/github-script@v7
        with:
          script: |
            const toDelete = [
              'source:reddit', 'source:discord', 'source:curseforge', 'source:github',
              'module:Focus', 'module:Presence', 'module:Core',
              'module:Vista', 'module:Cache', 'module:Pulse',
              'module:Essence', 'module:Insight', 'module:Verse',
              'priority:P0', 'priority:P1', 'priority:P2',
              'bug', 'feature', 'improvement', 'idea',
              'Focus', 'Presence', 'Core', 'Vista', 'Cache', 'Pulse', 'Essence', 'Insight', 'Verse',
              'Priority 0', 'Priority 1', 'Priority 2',
            ];
            for (const name of toDelete) {
              try {
                await github.rest.issues.deleteLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
                console.log(`Deleted label: ${name}`);
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }
            console.log('Label cleanup complete');

      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const catalogPath = path.join(process.env.GITHUB_WORKSPACE, 'tools', 'gitlab-label-catalog.json');
            const raw = fs.readFileSync(catalogPath, 'utf8');
            const labels = JSON.parse(raw);
            for (const label of labels) {
              const description = label.description || '';
              const color = String(label.color || 'ededed').replace('#', '');
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  description,
                  color,
                });
                console.log(`Created label: ${label.name}`);
              } catch (err) {
                if (err.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    description,
                    color,
                  });
                  console.log(`Updated label: ${label.name}`);
                } else {
                  throw err;
                }
              }
            }
