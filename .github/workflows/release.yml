name: Package Addon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default GITHUB_TOKEN is read-only in many orgs; packager needs write to create releases and upload assets.
permissions:
  contents: write

env:
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: WoW Packager
        uses: BigWigsMods/packager@v2.5.1

      - name: Build Discord release payload
        if: success()
        run: bash .release/build-release-payload.sh "${GITHUB_REF_NAME}"

      - name: Post to Discord
        if: success()
        continue-on-error: true
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_RELEASE }}
          raw-data: .release/discord-release-payload.json
