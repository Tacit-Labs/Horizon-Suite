name: Make a Request💡
description: A request, idea, or new functionality
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type (label)
      description: These values match the GitLab label set used for Horizon Suite triage.
      options:
        - "[Enhancement] Feature"
        - "[Enhancement] Improvement"
        - "[Enhancement] Localization"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module (label)
      description: Pick the closest module label.
      options:
        - "[Module] Focus"
        - "[Module] Presence"
        - "[Module] Vista"
        - "[Module] Cache"
        - "[Module] Essence"
        - "[Module] Insight"
        - "[Module] Flow"
        - "[Module] Axis"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would you use this feature?
      placeholder: "e.g. I often need to..."
    validations:
      required: false
