name: File a Bug Report 🐛
description: An unexpected problem or behaviour
type: bug
body:

  - type: dropdown
    id: module
    attributes:
      label: Module (label)
      description: Pick the closest module label.
      options:
        - "[Module] Focus"
        - "[Module] Presence"
        - "[Module] Vista"
        - "[Module] Cache"
        - "[Module] Essence"
        - "[Module] Insight"
        - "[Module] Flow"
        - "[Module] Axis"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What goes wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open...
        2. Click...
        3. See error
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual
      description: What did you expect? What happened instead?
      placeholder: Expected X, but Y happened.
    validations:
      required: false

  - type: textarea
    id: other_addons
    attributes:
      label: Other addons
      description: Any other addons that might be relevant?
      placeholder: List addons that might interact (or "None" / "Default UI only")
    validations:
      required: false
