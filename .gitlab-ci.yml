# GitLab CI: release on tag push v*
# Pushing a tag (e.g. v3.5.0) to GitLab triggers build + GitLab Release.
# For CurseForge/Wago upload, use GitHub release.yml or add secrets and packager here.

stages:
  - build
  - release

variables:
  PACKAGE_NAME: HorizonSuite

# Exclusions aligned with .pkgmeta ignore (so packaged addon matches GitHub release).
.build-release:
  stage: build
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[\d.]+$/
  before_script:
    - apk add --no-cache git zip rsync
  script:
    - mkdir -p "${PACKAGE_NAME}"
    # Copy repo into package dir, excluding CI and dev artifacts
    - |
      rsync -a --exclude='.git' --exclude='.github' --exclude='.gitlab-ci.yml' \
        --exclude='.cursor' --exclude='.claude' --exclude='.vscode' \
        --exclude='.gitignore' --exclude='.pkgmeta' --exclude='.pkgmeta.beta' \
        --exclude='HorizonSuiteBeta.toc' --exclude='scripts' --exclude='docs' \
        --exclude='notes' --exclude='pipeline.md' \
        --exclude='modules/*/notes' \
        . "${PACKAGE_NAME}/"
    - zip -r "${PACKAGE_NAME}-${CI_COMMIT_TAG}.zip" "${PACKAGE_NAME}"
  artifacts:
    paths:
      - "${PACKAGE_NAME}-${CI_COMMIT_TAG}.zip"

build:
  extends: .build-release

# Create GitLab Release with the zip. Artifact URL points to the build job output.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[\d.]+$/
  script:
    - |
      ASSET_URL="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${PACKAGE_NAME}-${CI_COMMIT_TAG}.zip?job=build"
      release-cli create --name "Release ${CI_COMMIT_TAG}" --tag-name "${CI_COMMIT_TAG}" \
        --description "$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "${CI_COMMIT_TAG}" 2>/dev/null || echo "${CI_COMMIT_TAG}")" \
        --assets-link "{\"name\":\"${PACKAGE_NAME}-${CI_COMMIT_TAG}.zip\",\"url\":\"${ASSET_URL}\"}"
