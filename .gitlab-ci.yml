# GitLab CI: release (tag v*), beta (manual trigger with BETA_BUILD=1), issuelog (schedule or ISSUELOG_RUN=1).
# Release: push tag v* (e.g. v3.5.0). Required: CF_API_KEY, WAGO_API_TOKEN.
# Beta: trigger pipeline with BETA_BUILD=1 and optional ref (e.g. glab ci run --ref feature/xyz -f BETA_BUILD=1).
#   Required for beta tag push: PROJECT_ACCESS_TOKEN (or GITLAB_TOKEN) with write_repository.
#   Optional: DISCORD_WEBHOOK_BETA for beta Discord notification.
# Issuelog: runs on schedule or manual (glab ci run -f ISSUELOG_RUN=1). Required: DISCORD_WEBHOOK_ISSUELOG.

stages:
  - issuelog
  - build
  - release
  - beta

variables:
  PACKAGER_VERSION: "v2.5.1"
  GIT_DEPTH: "0"

# Post open issues to Discord. Runs on schedule or manual trigger (glab ci run -f ISSUELOG_RUN=1).
# Add schedule in CI/CD → Schedules (e.g. 0 */6 * * * for every 6 hours).
issuelog:
  stage: issuelog
  image: ubuntu:22.04
  rules:
    - if: $ISSUELOG_RUN == "1"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  cache:
    key: issuelog-msg-id
    paths:
      - .release/discord-issuelog-message-id
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    - mkdir -p .release
    - bash .release/run-issuelog-gitlab.sh
    - |
      if [ -z "${DISCORD_WEBHOOK_ISSUELOG}" ]; then
        echo "DISCORD_WEBHOOK_ISSUELOG not set; skipping Discord post."
        exit 0
      fi
      MSG_ID_FILE=.release/discord-issuelog-message-id
      MSG_ID=""
      [ -f "$MSG_ID_FILE" ] && MSG_ID=$(cat "$MSG_ID_FILE" | tr -d '[:space:]')

      if [ -n "$MSG_ID" ]; then
        DEL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
          "${DISCORD_WEBHOOK_ISSUELOG}/messages/${MSG_ID}" || echo "000")
        echo "DELETE returned ${DEL_HTTP}"
      fi

      RESP=$(curl -s -w "\n%{http_code}" -X POST \
        "${DISCORD_WEBHOOK_ISSUELOG}?wait=true" \
        -H "Content-Type: application/json" \
        -d @.release/discord-issuelog-payload.json)
      HTTP=$(echo "$RESP" | tail -1)
      BODY=$(echo "$RESP" | sed '$d')
      NEW_ID=$(echo "$BODY" | jq -r '.id // empty')
      if [ -n "$NEW_ID" ]; then
        echo "$NEW_ID" > "$MSG_ID_FILE"
        echo "Posted new Discord message ${NEW_ID}"
      else
        echo "Failed to post (HTTP ${HTTP}): $BODY"
        exit 1
      fi

# Use BigWigs packager: package addon, upload to CurseForge and Wago.
# Mirrors .github/workflows/release.yml behavior.
build:
  stage: build
  image: ubuntu:22.04
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[\d.]+$/
  before_script:
    - apt-get update -qq && apt-get install -y -qq bash git curl zip unzip jq
    - bash --version | head -1
    # Fetch BigWigs packager release.sh (same as GitHub Action)
    - curl -sSL "https://raw.githubusercontent.com/BigWigsMods/packager/${PACKAGER_VERSION}/release.sh" -o /tmp/release.sh
    - chmod +x /tmp/release.sh
  script:
    # GitLab doesn't set GITHUB_*; set them so release.sh runs in "tag push" mode.
    - export GITHUB_ACTIONS=1
    - export GITHUB_EVENT_NAME=push
    - export GITHUB_REF="refs/tags/${CI_COMMIT_TAG}"
    - export GITHUB_REF_NAME="${CI_COMMIT_TAG}"
    - export GITHUB_WORKSPACE="${CI_PROJECT_DIR}"
    # release.sh writes to GITHUB_OUTPUT; use a temp file so it doesn't fail in GitLab CI
    - export GITHUB_OUTPUT="$(mktemp)"
    # Secrets from GitLab CI/CD variables (CF_API_KEY, WAGO_API_TOKEN)
    - export CF_API_KEY="${CF_API_KEY}"
    - export WAGO_API_TOKEN="${WAGO_API_TOKEN}"
    # No GitHub upload from GitLab; leave GITHUB_OAUTH unset so packager skips GitHub
    - cd "${CI_PROJECT_DIR}"
    - bash /tmp/release.sh
    - |
      if [ -n "${DISCORD_WEBHOOK_RELEASE}" ]; then
        curl -sS -X POST -H "Content-Type: application/json" -d "{\"username\":\"Addon Release Bot\",\"embeds\":[{\"title\":\"New Release: Horizon Suite — ${CI_COMMIT_TAG}\",\"url\":\"${CI_PROJECT_URL}/-/releases/${CI_COMMIT_TAG}\",\"description\":\"**Full release.** [Download on GitLab](${CI_PROJECT_URL}/-/releases/${CI_COMMIT_TAG}) · CurseForge · Wago\"}]}" "${DISCORD_WEBHOOK_RELEASE}" || true
      fi
  artifacts:
    paths:
      - .release/*.zip

# Create GitLab Release and attach the packaged zip.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[\d.]+$/
  script:
    - |
      ZIP=$(ls .release/*.zip 2>/dev/null | head -1)
      if [ -z "$ZIP" ]; then echo "No zip in .release/"; exit 1; fi
      NAME=$(basename "$ZIP")
      ASSET_URL="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/.release/${NAME}?job=build"
      release-cli create --name "Release ${CI_COMMIT_TAG}" --tag-name "${CI_COMMIT_TAG}" \
        --description "$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "${CI_COMMIT_TAG}" 2>/dev/null || echo "${CI_COMMIT_TAG}")" \
        --assets-link "{\"name\":\"${NAME}\",\"url\":\"${ASSET_URL}\"}"

# Beta build: package addon from any branch (trigger with BETA_BUILD=1).
# Run: glab ci run --ref <branch> -f BETA_BUILD=1 (default ref is main).
beta-build:
  stage: beta
  image: ubuntu:22.04
  rules:
    - if: $BETA_BUILD == "1"
  before_script:
    - apt-get update -qq && apt-get install -y -qq bash git curl zip unzip jq python3
    - cp .pkgmeta.beta .pkgmeta
    - curl -sSL "https://raw.githubusercontent.com/BigWigsMods/packager/${PACKAGER_VERSION}/release.sh" -o /tmp/release.sh
    - chmod +x /tmp/release.sh
  script:
    - export GITHUB_ACTIONS=1
    - export GITHUB_EVENT_NAME=push
    - export GITHUB_REF="refs/heads/${CI_COMMIT_REF_NAME}"
    - export GITHUB_REF_NAME="${CI_COMMIT_REF_NAME}"
    - export GITHUB_WORKSPACE="${CI_PROJECT_DIR}"
    - export GITHUB_OUTPUT="$(mktemp)"
    - cd "${CI_PROJECT_DIR}"
    - bash /tmp/release.sh -d
    - |
      ZIP=$(ls .release/*.zip 2>/dev/null | head -1)
      if [ -z "$ZIP" ]; then echo "No zip in .release/"; exit 1; fi
      cp "$ZIP" .release/HorizonSuite-beta.zip
    # Extract [Unreleased] for release notes
    - |
      BODY=$(python3 -c "
      import re
      content = open('CHANGELOG.md').read()
      match = re.search(r'## \[Unreleased\]\s*\n\n(.*?)(?=\n---\n)', content, re.DOTALL)
      raw = match.group(1).strip() if match else ''
      branch = '${CI_COMMIT_REF_NAME}'
      if not raw or 'Changelog entries are generated' in raw:
        print('Rolling beta from **' + branch + '**. Download the zip below.')
      else:
        print('Rolling beta from **' + branch + '**.' + chr(10) + chr(10) + '## Recent changes' + chr(10) + chr(10) + raw)
      ")
      echo "$BODY" > /tmp/beta-notes.md
    # Update beta tag to current commit (requires PROJECT_ACCESS_TOKEN or GITLAB_TOKEN)
    - |
      TOKEN="${PROJECT_ACCESS_TOKEN:-$GITLAB_TOKEN}"
      if [ -n "$TOKEN" ]; then
        git remote set-url origin "https://oauth2:${TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push origin :refs/tags/beta 2>/dev/null || true
        git tag -a beta -m "Beta from ${CI_COMMIT_REF_NAME}"
        git push origin refs/tags/beta --force
      else
        echo "Warning: PROJECT_ACCESS_TOKEN or GITLAB_TOKEN not set; skipping beta tag update. Run beta-release manually or set token."
      fi
    - cp /tmp/beta-notes.md .release/beta-notes.md
    - |
      if [ -n "${DISCORD_WEBHOOK_BETA}" ]; then
        BODY=$(cat /tmp/beta-notes.md)
        BODY_ESC=$(printf '%s' "$BODY" | jq -Rs 'if length > 4096 then .[0:4096] else . end')
        curl -sS -X POST -H "Content-Type: application/json" \
          -d "{\"username\":\"Addon Beta Bot\",\"embeds\":[{\"title\":\"New Beta Build: Horizon Suite\",\"url\":\"${CI_PROJECT_URL}/-/releases/beta\",\"description\":$BODY_ESC}]}" \
          "${DISCORD_WEBHOOK_BETA}" || true
      fi
  artifacts:
    paths:
      - .release/HorizonSuite-beta.zip
      - .release/beta-notes.md

beta-release:
  stage: beta
  image: ubuntu:22.04
  needs:
    - job: beta-build
  rules:
    - if: $BETA_BUILD == "1"
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    - |
      ARTIFACT_URL="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/.release/HorizonSuite-beta.zip?job=beta-build"
      NOTES=$(cat .release/beta-notes.md)
      API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      if [ -n "${PROJECT_ACCESS_TOKEN}" ] || [ -n "${GITLAB_TOKEN}" ]; then
        AUTH="PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN:-$GITLAB_TOKEN}"
      else
        AUTH="JOB-TOKEN: ${CI_JOB_TOKEN}"
      fi
      # Delete existing beta release so create succeeds (409 "Release already exists" otherwise)
      curl -s -o /dev/null -w "%{http_code}" --request DELETE --header "$AUTH" "${API}/beta" || true
      # Create release (tag already exists from beta-build)
      BODY=$(printf '%s' "$NOTES" | jq -Rs --arg url "$ARTIFACT_URL" '{ name: "Beta", tag_name: "beta", description: ., assets: { links: [{ name: "HorizonSuite-beta.zip", url: $url, link_type: "other" }] } }')
      HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" --request POST --header "Content-Type: application/json" --header "$AUTH" --data "$BODY" "$API")
      if [ "$HTTP" != "201" ]; then
        echo "Release create failed (HTTP $HTTP):"; cat /tmp/resp.json
        exit 1
      fi

# Add this job - runs on MRs and pushes to branches, does nothing (or runs lint/tests if you add them later)
mr-check:
  stage: build  # or a new "validate" stage
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_TAG == null
  script:
    - echo "MR/branch pipeline - no release jobs needed"
